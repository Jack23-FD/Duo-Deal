# Server Port Configuration
server.port=server.port=${PORT:10000}

# Database Configuration (MySQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate properties
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mail Service Configuration (Gmail SMTP template / Local Simulated SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.debug=true

# JWT Token Configuration (Custom secret and expiration)
# Secret must be at least 256 bits (32 bytes) long (Base64 encoded or clear text)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 7 days in milliseconds = 7 * 24 * 60 * 60 * 1000 = 604800000
jwt.expiration=604800000

# App Configs
app.frontend.url=http://localhost:5174
